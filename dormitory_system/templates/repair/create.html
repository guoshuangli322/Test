{% extends 'base.html' %}
{% block title %}提交报修{% endblock %}
{% block content %}
<div class="page-header"><h4><i class="fas fa-plus-circle me-2"></i>提交报修</h4></div>
<div class="form-card"><form method="post" enctype="multipart/form-data">{% csrf_token %}
    {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{{ field.errors }}</div>{% endfor %}
    <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane me-1"></i>提交</button>
</form></div>
{% endblock %}

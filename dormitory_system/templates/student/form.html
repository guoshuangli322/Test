{% extends 'base.html' %}
{% block title %}{% if object %}编辑学生{% else %}添加学生{% endif %}{% endblock %}
{% block content %}
<div class="page-header"><h4><i class="fas fa-user-{% if object %}edit{% else %}plus{% endif %} me-2"></i>{% if object %}编辑学生{% else %}添加学生{% endif %}</h4></div>
<div class="form-card"><form method="post">{% csrf_token %}
    {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{{ field.errors }}</div>{% endfor %}
    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>保存</button>
    <a href="{% url 'student_list' %}" class="btn btn-secondary">取消</a>
</form></div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}导入学生{% endblock %}
{% block content %}
<div class="page-header"><h4><i class="fas fa-upload me-2"></i>Excel导入学生</h4></div>
<div class="form-card">
    <div class="alert alert-info"><i class="fas fa-info-circle me-2"></i>请先<a href="{% url 'student_template' %}" class="alert-link">下载模板</a>，按模板格式填写后上传。</div>
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
        <div class="mb-3"><label class="form-label">选择Excel文件</label><input type="file" name="file" class="form-control" accept=".xlsx,.xls" required></div>
        <button type="submit" class="btn btn-success"><i class="fas fa-upload me-1"></i>导入</button>
        <a href="{% url 'student_list' %}" class="btn btn-secondary">取消</a>
    </form>
</div>
{% endblock %}

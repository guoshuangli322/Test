{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header"><h4><i class="fas fa-user-{{ title|yesno:'edit,plus' }} me-2"></i>{{ title }}</h4></div>
<div class="form-card">
    <form method="post">{% csrf_token %}
        {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{{ field.errors }}</div>{% endfor %}
        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>保存</button>
        <a href="{% url 'user_list' %}" class="btn btn-secondary">取消</a>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}修改密码{% endblock %}
{% block content %}
<div class="page-header"><h4><i class="fas fa-key me-2"></i>修改密码</h4></div>
<div class="form-card">
    <form method="post">{% csrf_token %}
        {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{{ field.errors }}</div>{% endfor %}
        <button type="submit" class="btn btn-primary"><i class="fas fa-check me-1"></i>确认修改</button>
    </form>
</div>
{% endblock %}

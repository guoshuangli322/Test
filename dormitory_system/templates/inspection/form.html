{% extends 'base.html' %}
{% block title %}卫生检查{% endblock %}
{% block content %}
<div class="page-header"><h4><i class="fas fa-clipboard-check me-2"></i>添加检查记录</h4></div>
<div class="form-card"><form method="post" enctype="multipart/form-data">{% csrf_token %}
    {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{{ field.errors }}</div>{% endfor %}
    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>保存</button>
    <a href="{% url 'inspection_list' %}" class="btn btn-secondary">取消</a>
</form></div>
{% endblock %}

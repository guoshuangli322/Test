{% extends 'base.html' %}
{% block title %}房间表单{% endblock %}
{% block content %}
<div class="page-header"><h4><i class="fas fa-door-open me-2"></i>{% if object %}编辑房间{% else %}添加房间{% endif %}</h4></div>
<div class="form-card"><form method="post">{% csrf_token %}
    {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{{ field.errors }}</div>{% endfor %}
    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>保存</button>
    {% if object %}<a href="{% url 'room_list' object.building_id %}" class="btn btn-secondary">取消</a>{% endif %}
</form></div>
{% endblock %}
